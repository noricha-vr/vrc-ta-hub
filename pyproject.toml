[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
# 段階的に有効化。まずはデフォルトルールセット (E, F) から始める。
select = ["E", "F"]
ignore = [
    "E402",  # module-import-not-at-top-of-file（Django の settings / signals で頻出）
    "E501",  # line-too-long（既存コードが多数違反、段階的に対応）
]

[tool.ruff.lint.per-file-ignores]
"app/*/migrations/*.py" = ["E", "F"]  # Django マイグレーションは自動生成のため除外
"app/website/settings.py" = ["F401"]  # settings.py の条件付き import を許容

[tool.coverage.run]
# coverage は app/ 配下を作業ディレクトリとして実行する想定（CI / Docker 共通）。
# source = ["."] とすることで、どちらの実行コンテキストでも app/ 配下を計測対象にできる。
source = ["."]
omit = [
    "*/migrations/*",
    "*/tests/*",
    "*/conftest.py",
    "manage.py",
    "*/settings/*",
]

[tool.coverage.report]
precision = 1
show_missing = false
skip_covered = false
# 強制しない (将来 70 に引き上げる)。閾値の理由は docs/coverage.md を参照
fail_under = 0
