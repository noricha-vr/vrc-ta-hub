services:

  vrc-ta-hub:
    container_name: '${COMPOSE_PROJECT_NAME:-vrc-ta-hub}-app'
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./app:/app
      - ./docs:/docs
      - ./cloudbuild.yaml:/cloudbuild.yaml:ro
    env_file:
      # - .env
      - .env.local
    environment:
      - DEBUG=True
      - PYTHONPATH=/app
    ports:
      - '${APP_PORT:-8015}:8080'
    networks:
      - my_network
    depends_on:
      db:
        condition: service_healthy
    # 開発環境: コード変更時に自動リロード
    command: /bin/sh -c "python manage.py wait_for_db --timeout 90 && python manage.py runserver 0.0.0.0:8080"

  db:
    container_name: '${COMPOSE_PROJECT_NAME:-vrc-ta-hub}-db'
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: vrc_ta_hub
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - '${DB_PORT:-3306}:3306'
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - my_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  storage:
    container_name: '${COMPOSE_PROJECT_NAME:-vrc-ta-hub}-storage'
    image: rustfs/rustfs
    environment:
      RUSTFS_ROOT_USER: minioadmin
      RUSTFS_ROOT_PASSWORD: minioadmin
    ports:
      - '${STORAGE_PORT:-9000}:9000'
      - '${STORAGE_CONSOLE_PORT:-9001}:9001'
    volumes:
      - storage_data:/data
    networks:
      - my_network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/ || test $? -eq 22"]
      interval: 5s
      timeout: 5s
      retries: 5

  storage-init:
    container_name: '${COMPOSE_PROJECT_NAME:-vrc-ta-hub}-storage-init'
    image: minio/mc
    depends_on:
      storage:
        condition: service_healthy
    networks:
      - my_network
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://storage:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/vrc-ta-hub &&
      mc anonymous set download local/vrc-ta-hub
      "

volumes:
  db_data:
  storage_data:

networks:
  my_network:
