services:

  vrc-ta-hub:
    container_name: 'vrc-ta-hub'
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./app:/app
      - ./docs:/docs
      - ./cloudbuild.yaml:/cloudbuild.yaml:ro
    env_file:
      # - .env
      - .env.local
    environment:
      - DEBUG=True
      - PYTHONPATH=/app
    ports:
      - '8015:8080'
    networks:
      - my_network
    depends_on:
      db:
        condition: service_healthy
    # 開発環境: コード変更時に自動リロード
    command: python manage.py runserver 0.0.0.0:8080

  db:
    container_name: 'vrc-ta-hub-db'
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: vrc_ta_hub
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - my_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  storage:
    container_name: 'vrc-ta-hub-storage'
    image: rustfs/rustfs
    environment:
      RUSTFS_ROOT_USER: minioadmin
      RUSTFS_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - storage_data:/data
    networks:
      - my_network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/ || test $? -eq 22"]
      interval: 5s
      timeout: 5s
      retries: 5

  storage-init:
    container_name: 'vrc-ta-hub-storage-init'
    image: curlimages/curl
    depends_on:
      storage:
        condition: service_healthy
    networks:
      - my_network
    entrypoint: >
      /bin/sh -c "
      curl -sf -o /dev/null -X PUT http://minioadmin:minioadmin@storage:9000/vrc-ta-hub || true;
      curl -sf -o /dev/null -X PUT http://minioadmin:minioadmin@storage:9000/vrc-ta-hub/?policy -d '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Principal\":{\"AWS\":[\"*\"]},\"Action\":[\"s3:GetObject\"],\"Resource\":[\"arn:aws:s3:::vrc-ta-hub/*\"]}]}' || true;
      exit 0;
      "

volumes:
  db_data:
  storage_data:

networks:
  my_network:
