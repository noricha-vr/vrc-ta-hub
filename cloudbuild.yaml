steps:
  # ステップ1：Kanikoを使用してDockerイメージのビルドとプッシュ
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
      - '--destination=${_DOCKER_PATH}${_SERVICE_NAME}:$SHORT_SHA'
      - '--destination=${_DOCKER_PATH}${_SERVICE_NAME}:latest'
      - '--cache=true'
      - '--cache-ttl=168h'
      - '--dockerfile=./Dockerfile'

  # ステップ2：Google Cloud Runにイメージをデプロイ
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - '--no-traffic'
      - '--allow-unauthenticated'
      - '--cpu'
      - '1'
      - '--memory'
      - '512Mi'
      - '--region'
      - 'asia-northeast1'
      - '--image'
      - '${_DOCKER_PATH}${_SERVICE_NAME}:$SHORT_SHA'
      - '--platform'
      - 'managed'
      - '--revision-suffix'
      - '$SHORT_SHA'
      - '--set-secrets'
      - 'DISCORD_WEBHOOK_URL=DISCORD_WEBHOOK_URL:latest,DISCORD_CLIENT_ID=DISCORD_CLIENT_ID:latest,DISCORD_CLIENT_SECRET=DISCORD_CLIENT_SECRET:latest,DISCORD_REPORT_WEBHOOK_URL=DISCORD_REPORT_WEBHOOK_URL:latest,X_API_KEY=X_API_KEY:latest,X_API_SECRET=X_API_SECRET:latest,X_ACCESS_TOKEN=X_ACCESS_TOKEN:latest,X_ACCESS_TOKEN_SECRET=X_ACCESS_TOKEN_SECRET:latest'
      - '${_SERVICE_NAME}'

  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-ceu'
      - |
        LEGACY_TAGS="$(
          gcloud run services describe "${_SERVICE_NAME}" \
            --project="${PROJECT_ID}" \
            --region='asia-northeast1' \
            --format='csv[no-heading](status.traffic[].tag)' \
          | tr ',\n' '\n\n' \
          | sed '/^$/d' \
          | grep '^rev-' \
          | paste -sd, -
        )"

        UPDATE_ARGS=(
          run services update-traffic "${_SERVICE_NAME}"
          --project="${PROJECT_ID}"
          --region='asia-northeast1'
          --update-tags='preview=LATEST'
        )

        if [ -n "${LEGACY_TAGS}" ]; then
          UPDATE_ARGS+=(--remove-tags="${LEGACY_TAGS}")
        fi

        gcloud "${UPDATE_ARGS[@]}"

substitutions:
  _SERVICE_NAME: 'vrc-ta-hub'
  _DOCKER_PATH: 'asia-northeast1-docker.pkg.dev/vrc-ta-hub/docker/'
