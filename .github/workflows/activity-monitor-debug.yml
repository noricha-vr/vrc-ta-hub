name: Activity monitor debug

on:
  push:
    branches: [agent/community-activity-monitor]
  pull_request:
    branches: [main]

jobs:
  focused-test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: "test-secret-key-for-ci"
      DEBUG: "True"
      TESTING: "1"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      CSRF_TRUSTED_ORIGIN: "https://localhost"
      GOOGLE_API_KEY: "dummy-google-api-key"
      GOOGLE_CALENDAR_ID: "dummy-calendar-id@group.calendar.google.com"
      GEMINI_API_KEY: "dummy-gemini-api-key"
      OPENAI_API_KEY: "dummy-openai-api-key"
      REQUEST_TOKEN: "dummy-request-token"
      EMAIL_FILE_PATH: "/tmp/emails"
    steps:
      - name: Clone, install, run focused tests, and print only the tail
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          git clone --quiet --depth 1 \
            --branch agent/community-activity-monitor \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          clone_status=$?
          if [ "$clone_status" -ne 0 ]; then
            echo "git clone failed: $clone_status"
            exit "$clone_status"
          fi
          cd repo
          python3 -m pip install --quiet uv
          uv pip sync --system requirements.lock >/dev/null 2>&1
          cd app
          python manage.py test community.tests.test_activity_monitor --noinput > /tmp/activity-monitor-test.log 2>&1
          status=$?
          tail -n 70 /tmp/activity-monitor-test.log
          exit "$status"
