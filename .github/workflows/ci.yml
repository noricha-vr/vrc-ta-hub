name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  isolation-gate:
    name: isolation-gate
    runs-on: ubuntu-latest
    steps:
      # safe-to-testはSHAに紐づかないため、publisher有効化前にrulesetで対象branchの更新を禁止する。
      - name: Block unapproved isolation PR
        if: >-
          github.event_name == 'pull_request' &&
          startsWith(github.event.pull_request.head.ref, 'fix-flow/isolation-task-') &&
          !contains(github.event.pull_request.labels.*.name, 'safe-to-test')
        run: |
          echo "::error::Isolation PR requires the safe-to-test label from a trusted reviewer."
          exit 1

      - name: Confirm CI execution is allowed
        run: echo "CI execution is allowed."

  lint:
    needs: isolation-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Run ruff lint
        run: |
          uv pip install --system ruff==0.11.6
          ruff check app/

  test:
    needs: [isolation-gate, lint]
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: "test-secret-key-for-ci"
      DEBUG: "True"
      TESTING: "1"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      CSRF_TRUSTED_ORIGIN: "https://localhost"
      # Required environment variables (dummy values for CI)
      GOOGLE_API_KEY: "dummy-google-api-key"
      GOOGLE_CALENDAR_ID: "dummy-calendar-id@group.calendar.google.com"
      GEMINI_API_KEY: "dummy-gemini-api-key"
      OPENAI_API_KEY: "dummy-openai-api-key"
      OPENROUTER_API_KEY: "dummy-openrouter-api-key"
      X_API_KEY: "dummy-x-api-key"
      X_API_SECRET: "dummy-x-api-secret"
      X_ACCESS_TOKEN: "dummy-x-access-token"
      X_ACCESS_TOKEN_SECRET: "dummy-x-access-token-secret"
      DISCORD_WEBHOOK_URL: "https://discord.invalid/offline-test"
      REQUEST_TOKEN: "dummy-request-token"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.lock"

      - name: Install dependencies (locked)
        run: uv pip sync --system requirements.lock

      - name: Check for missing migrations
        working-directory: app
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests with coverage
        working-directory: app
        env:
          EMAIL_FILE_PATH: "/tmp/emails"
        run: |
          # 実サービスへ接続する live smoke とブラウザE2Eだけを除外する。
          # OfflineNetworkDiscoverRunner が loopback 以外への接続を拒否するため、
          # dummy credentialを渡しても通常suiteから外向き通信は発生しない。
          # coverage 設定は ../pyproject.toml の [tool.coverage] を参照
          coverage run --rcfile=../pyproject.toml -m tests.offline_manage test \
            --exclude-tag=live_smoke --exclude-tag=e2e \
            --testrunner=website.tests.offline_runner.OfflineNetworkDiscoverRunner \
            --noinput
          coverage report --rcfile=../pyproject.toml

  e2e:
    needs: [isolation-gate, lint]
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: "test-secret-key-for-ci"
      DEBUG: "True"
      TESTING: "1"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      CSRF_TRUSTED_ORIGIN: "https://localhost"
      GOOGLE_API_KEY: "dummy-google-api-key"
      GOOGLE_CALENDAR_ID: "dummy-calendar-id@group.calendar.google.com"
      GEMINI_API_KEY: "dummy-gemini-api-key"
      OPENAI_API_KEY: "dummy-openai-api-key"
      REQUEST_TOKEN: "dummy-request-token"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "requirements*.lock"

      - name: Install dependencies (locked)
        run: uv pip sync --system requirements.lock requirements-e2e.lock

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run browser E2E tests
        working-directory: app
        run: python manage.py test website.tests.e2e.test_user_journeys --tag=e2e --noinput --verbosity=2

      - name: Upload E2E failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts
          path: test-results/e2e/
          if-no-files-found: warn
          retention-days: 14

  mypy:
    needs: [isolation-gate, lint]
    runs-on: ubuntu-latest
    # warn-only は continue-on-error で維持しつつ、型エラーは job 単位の失敗として可視化する (docs/mypy.md 参照)
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.lock"

      - name: Install dependencies (locked)
        run: uv pip sync --system requirements.lock

      - name: Run mypy (warn-only, app/event/services/)
        working-directory: app
        run: |
          # Phase 1: event/services/ のみ。job 全体の continue-on-error で warn-only を維持しつつ、
          # 型エラーはこの step の失敗として可視化する（|| true で握り潰さない）。docs/mypy.md の段階導入計画参照
          mypy event/services/ --config-file ../pyproject.toml
