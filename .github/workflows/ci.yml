name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Run ruff lint
        run: |
          uv pip install --system ruff==0.11.6
          ruff check app/

  test:
    needs: lint
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: "test-secret-key-for-ci"
      DEBUG: "True"
      TESTING: "1"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      CSRF_TRUSTED_ORIGIN: "https://localhost"
      # Required environment variables (dummy values for CI)
      GOOGLE_API_KEY: "dummy-google-api-key"
      GOOGLE_CALENDAR_ID: "dummy-calendar-id@group.calendar.google.com"
      GEMINI_API_KEY: "dummy-gemini-api-key"
      OPENAI_API_KEY: "dummy-openai-api-key"
      REQUEST_TOKEN: "dummy-request-token"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Run tests
        working-directory: app
        env:
          EMAIL_FILE_PATH: "/tmp/emails"
        run: |
          # 外部API / 環境依存テストは @tag('external_api') で除外する
          # 新規テストを追加した時に「CI で実行されない」事故を防ぐため、
          # 除外モジュールを列挙するのではなくタグで一括除外する方式に統一している
          python manage.py test --exclude-tag=external_api --noinput
