# nginx-app.conf

# Cloud Run の tagged preview host（`rev-*---` / `canary---` 等）だけを正規ホストへ寄せて、
# Django に raw run.app host が届かないようにする。参照: PR #193（Cloud Run preview host を nginx 前段で正規化した理由）
map $http_host $django_upstream_host {
    default $http_host;
    ~^(?:[a-z0-9-]+---)?(?:vrc\-ta\-hub|vrc\-ta\-hub\-dev)-[a-z0-9]+-[a-z0-9]+\.a\.run\.app(?::\d+)?$ vrc-ta-hub.com;
}

# the upstream component nginx needs to connect to
upstream django {
    # server unix:/app.sock; # for a file socket
    server 127.0.0.1:8000; # for a web port socket (we'll use this first)
}

# configuration of the server
server {
    # the port your site will be served on, default_server indicates that this server block
    # is the block to use if no blocks match the server_name
    listen      8080;

    # the domain name it will serve for
    server_name vrc-ta-hub.com; # substitute your machine's IP address or FQDN
    charset     utf-8;


    # max upload size
    client_max_body_size 32M;   # adjust to taste
    # set timeout
    uwsgi_read_timeout 120s;
    proxy_read_timeout 120s;
    uwsgi_send_timeout 120s;
    proxy_send_timeout 120s;
    # Django media
    location /media  {
        alias /app/media;  # your Django project's media files - amend as required
    }

    location /static {
        alias /app/static; # your Django project's static files - amend as required
    }

    # Finally, send all non-media requests to the Django server.
    location / {
        proxy_pass  http://127.0.0.1:8000;
        proxy_set_header Host $django_upstream_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        include     /uwsgi_params; # the uwsgi_params file you installed
    }
}
